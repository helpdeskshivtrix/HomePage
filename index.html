    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #0f1729;
            --secondary-color: #1e3a8a;
            --accent-color: #3b82f6;
            --tertiary-color: #1d4ed8;
            --light-bg: #f8fafc;
            --neon-blue: #00d4ff;
            --neon-cyan: #00fff5;
            --neon-white: #ffffff;
            --glass-blue: rgba(59, 130, 246, 0.1);
        }
    }

    @layer base {
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
        }
        
        .cyber-grid {
            background: 
                linear-gradient(90deg, transparent 49%, rgba(0,212,255,0.1) 50%, transparent 51%),
                linear-gradient(180deg, transparent 49%, rgba(0,212,255,0.1) 50%, transparent 51%);
            background-size: 100px 100px;
        }
    }

    @layer utilities {
        .glow-blue {
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
        }
        
        .glow-purple {
            box-shadow: 0 0 20px rgba(181,55,242,0.5);
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        .pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }
        
        .slide-up {
            animation: slideUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(50px);
        }
        
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
        }
        
        .neon-glow {
            animation: neonGlow 3s ease-in-out infinite alternate;
        }
        
        .data-stream {
            animation: dataStream 4s linear infinite;
        }
        
        .card-flip {
            perspective: 1000px;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        
        .card-flip:hover .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 2rem;
        }
        
        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--secondary-color), var(--tertiary-color));
        }
        
        .holographic-border {
            border: 2px solid transparent;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-cyan)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .tech-grid {
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px var(--neon-blue); }
            100% { box-shadow: 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-blue); }
        }
        
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        @keyframes neonGlow {
            0% { 
                box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 30px var(--neon-blue);
                text-shadow: 0 0 10px var(--neon-blue);
            }
            100% { 
                box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-cyan);
                text-shadow: 0 0 20px var(--neon-cyan);
            }
        }
        
        @keyframes dataStream {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }
    }
    </style>
</head>
<body class="bg-[var(--primary-color)] cyber-grid">
